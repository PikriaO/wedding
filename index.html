<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invitation</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: #fdf6f0;
      color: #333;
      padding: 40px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 { color: #c94f7c; }
    .date { font-size: 20px; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're Invited!</h1>
    <h2>Alice & Bob</h2>
<img src="img2.jpg"/>
    <p class="date">June 15, 2026</p>

    <p>Join us to celebrate our wedding</p>

    <p><strong>Location:</strong><br>
    Sunset Garden, Tbilisi</p>

    <p>We can't wait to celebrate with you ❤️</p>
  </div>
</body>
</html>
