<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Gallery</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
    }

    .slider {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      height: 100vh;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      align-items: center;
    }

    .slider::-webkit-scrollbar {
      display: none;
    }

    .slide {
      min-width: 100%;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    .image-wrapper {
      position: relative;
      width: 90%;
      max-width: 900px;
      height: 70vh;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .image-wrapper img,
    .image-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: scale-down;
      background: black;
    }

    .text {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      color: white;
      font-size: clamp(14px, 2vw, 22px);
      background: rgba(0,0,0,0.5);
      padding: 10px 14px;
      border-radius: 12px;
    }

    /* BUTTONS SCREEN */
    .decision {
      position: absolute;
      bottom: 30px;
      display: flex;
      gap: 15px;
      justify-content: center;
      width: 100%;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 16px;
      background: white;
      color: black;
      font-weight: bold;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* INVITATION */
    .invitation {
      height: 100vh;
      display: none;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: #111;
    }

    .invitation.show {
      display: flex;
    }

    /* VIDEO hidden by default */
    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="slider">

  <div class="slide">
    <div class="image-wrapper">
      <img src="img1.jpg">
      <div class="text">From all our memories to this moment…</div>
    </div>
  </div>

  <div class="slide">
    <div class="image-wrapper">
      <img src="img7.jpg">
      <div class="text">You’ve been part of my story for so long</div>
    </div>
  </div>

  <div class="slide">
    <div class="image-wrapper">
      <img src="img6.jpg">
      <div class="text">Will you be my bridesmaid?</div>
    </div>
  </div>

  <!-- FINAL DECISION SLIDE -->
  <div class="slide">
    <div class="image-wrapper">

      <!-- VIDEO (hidden initially) -->
      <video id="video" class="hidden" src="vid1.MOV" controls></video>

      <!-- BUTTONS -->
      <div id="buttons" class="decision">
        <button class="btn" onclick="playVideo()">Yes</button>
        <button class="btn" onclick="openInvitation()">Yes of course</button>
      </div>

    </div>
  </div>

</div>

<!-- INVITATION SCREEN -->
<div id="invitation" class="invitation">
  <h1>💍 Wedding Invitation 💍<br/>You’re officially invited!</h1>
</div>

<script>
  function playVideo() {
    document.getElementById("video").classList.remove("hidden");
    document.getElementById("buttons").style.display = "none";

    const video = document.getElementById("video");
    video.play();
  }

  function openInvitation() {
    document.getElementById("invitation").classList.add("show");
    document.querySelector(".slider").style.display = "none";
  }
</script>

</body>
</html>
